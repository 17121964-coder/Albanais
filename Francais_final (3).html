<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premières révisions</title>
<style>
:root{--primary:#27ae60;--secondary:#2980b9;--action:#e67e22;--error:#e74c3c;--bg:#fffde7;--violet:#8e44ad;--nav:#7f8c8d;--ar:#27ae60;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);margin:0;padding:0;}body{font-family:'Segoe UI',sans-serif;background:var(--bg);display:flex;justify-content:center;align-items:center;min-height:100vh;min-height:100dvh;}
.container{background:var(--bg);width:93%;max-width:420px;border-radius:20px;box-shadow:0 4px 18px rgba(0,0,0,0.10);padding:16px;text-align:center;}
.rubrique-badge{background:#f9e94e;color:#5a4a00;padding:5px 14px;border-radius:20px;font-size:.75rem;font-weight:bold;margin-bottom:8px;display:inline-flex;align-items:center;gap:6px;border:1px solid #d4c400;width:auto;justify-content:center;flex-wrap:wrap;white-space:nowrap;}
.card{background:rgba(255,255,255,0.7);border:1px solid #e8e0a0;border-radius:14px;padding:8px;margin-bottom:6px;}
.diff-container{font-size:1.3rem;margin:8px 0;letter-spacing:2px;min-height:1.8rem;display:flex;justify-content:center;flex-wrap:nowrap;align-items:center;gap:2px;overflow-x:auto;}
.char-correct{color:var(--primary);font-weight:bold;}
.char-wrong{color:var(--error);text-decoration:line-through;}
.char-missing{color:#bbb;}
.char-accent{color:var(--action);font-weight:bold;}

.btn{border:none;border-radius:12px;cursor:pointer;font-size:.85rem;font-weight:bold;width:100%;min-height:44px;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:6px;transition:.2s;font-family:'Segoe UI',sans-serif;}
.btn-menu{background:white;border:1px solid #ccc;color:#333;padding:14px 16px;text-align:left;justify-content:flex-start;min-height:62px;border-radius:12px;}
.btn-menu:hover{background:#f5f5f5;}
.btn-play{background:var(--secondary);color:white;}
.btn-verify{background:var(--action);color:white;}
.btn-ok{background:var(--primary);color:white;font-size:1rem;min-height:48px;border-radius:14px;}
.btn-ko{background:var(--error);color:white;font-size:1rem;min-height:48px;border-radius:14px;}
.btn-continue{background:var(--secondary);color:white;font-size:1rem;min-height:48px;border-radius:14px;box-shadow:0 3px 8px rgba(41,128,185,0.3);}
.btn-nav{background:none;color:#95a5a6;border:1px solid #ccc;min-height:30px;margin-top:10px;font-size:.75rem;padding:4px 8px;}
.eval-box{display:none;flex-direction:column;}
.footer{margin-top:4px;font-size:.7rem;color:#b5a84a;font-weight:400;}
.bravo-svg{width:70px;height:70px;margin:8px auto;display:block;}
.score-final{font-size:1rem;font-weight:bold;color:#2c3e30;margin:8px 0;background:#f4f7f4;padding:7px;border-radius:10px;border:1px dashed #b8ccba;}
.word-illustration{width:100%;max-width:170px;height:auto;max-height:130px;object-fit:contain;margin:0 auto 6px;display:block;border-radius:10px;}
.hint-illustration{width:100%;max-width:160px;height:auto;max-height:120px;object-fit:contain;display:block;margin:0 auto;border-radius:8px;opacity:0.9;}

.menu-icons{font-size:2.4rem;display:flex;align-items:center;gap:4px;min-width:80px;justify-content:center;flex-shrink:0;}
.menu-plus{font-size:1rem;color:#8e44ad;font-weight:bold;}
.menu-label{font-size:1.15rem;font-weight:bold;color:#333;flex:1;padding-left:8px;text-align:left;}

.btn-ar-sound{background:none;border:none;cursor:pointer;padding:0 2px;opacity:.85;flex-shrink:0;line-height:1;display:inline-flex;align-items:center;vertical-align:middle;}
.btn-ar-sound:hover{opacity:1;}
/* zone réponse */
.answer-display{
  min-height:52px;border:3px dashed #dee2e6;border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  background:#f9f9f9;margin-bottom:7px;padding:6px 10px;
  white-space:nowrap;overflow:hidden;
}
.answer-display:empty::after{content:'...';color:#bbb;font-size:.9rem;}
.answer-word{
  display:inline-block;white-space:nowrap;
  font-size:clamp(0.7rem,6vw,1.4rem);
  letter-spacing:clamp(2px,1vw,6px);
  font-family:'Courier New',monospace;
  color:#2c3e50;line-height:1.4;
}
.answer-char{
  display:inline-block;
  cursor:pointer;
  border-bottom:2px solid #dee2e6;
  padding:0 1px;
  transition:color .1s;
}
.answer-char.live-ko{color:var(--error);text-decoration:line-through;border-color:var(--error);}
.answer-char:hover{color:var(--error);}
.answer-char.model{color:#ccc;border-color:#eee;}

/* clavier */
.magnetic-keyboard{background:#d5d8dc;border-radius:14px;padding:9px 6px;margin-top:8px;}
.keyboard-rows{display:flex;flex-direction:column;gap:4px;}
.keyboard-row{display:flex;justify-content:center;gap:3px;flex-wrap:wrap;}
.mag-letter{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:7px;font-size:.95rem;font-weight:bold;cursor:pointer;border:none;box-shadow:0 3px 0 rgba(0,0,0,.2);flex-shrink:0;transition:transform .1s,box-shadow .1s;}
.mag-letter:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.2);}
.mag-letter:disabled{opacity:.4;cursor:default;}
.vowel{background:#2c3e50;color:white;border:1px solid #1a252f;font-family:"Courier New",monospace;}
.consonant{background:#f2f3f4;color:#1a1a1a;border:1px solid #bbb;font-family:"Courier New",monospace;}
.mag-delete{padding:0 10px;background:#626567;color:white;font-size:.8rem;height:34px;border-radius:7px;border:none;cursor:pointer;font-weight:bold;font-family:"Courier New",monospace;box-shadow:0 3px 0 rgba(0,0,0,.2);}
.mag-delete:disabled{opacity:.4;cursor:default;}
.mag-space{width:75px;height:34px;background:#f2f3f4;border:1px solid #bbb;border-radius:7px;cursor:pointer;font-size:.7rem;color:#626567;font-family:"Courier New",monospace;box-shadow:0 3px 0 rgba(0,0,0,.15);}
.mag-space:disabled{opacity:.4;cursor:default;}

/* copie*/
.guided-word{display:flex;justify-content:center;gap:3px;flex-wrap:nowrap;margin:8px 0;overflow-x:auto;padding:4px 12px;scroll-padding:12px;-webkit-overflow-scrolling:touch;}
.guided-cell{width:clamp(22px,7.5vw,32px);height:clamp(28px,8.5vw,38px);border-radius:7px;border:2px solid #dee2e6;display:flex;align-items:center;justify-content:center;font-size:clamp(.78rem,3.2vw,1.2rem);background:#f9f9f9;transition:background .3s,border-color .3s;flex-shrink:0;}
.guided-cell.active{border-color:var(--secondary);background:#ebf5fb;animation:pulse .9s infinite;}
.guided-cell.ok{border-color:var(--primary);background:#eafaf1;color:var(--primary);font-weight:bold;}
.guided-cell.ko{border-color:var(--error);background:#fdedec;color:var(--error);animation:shake .3s;}
.guided-cell.space{border:none;background:none;width:10px;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(41,128,185,.3);}50%{box-shadow:0 0 0 5px rgba(41,128,185,0);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}

#end-screen{display:none;}
#game-zone{background:#fffde7;border-radius:16px;padding:10px;}
#end-screen{border-radius:16px;padding:10px;background:#fffde7;}

/* barre de progression */
.progress-bar-wrap{background:#e8e0a0;border-radius:20px;height:10px;margin-bottom:10px;overflow:hidden;}
.progress-bar-fill{height:100%;background:var(--secondary);transition:width .4s ease;}



/* mobile */
@media(max-width:380px){
  .mag-letter{width:30px;height:30px;font-size:.82rem;}
  .mag-delete{font-size:.72rem;padding:0 7px;height:30px;}
  .mag-space{width:62px;font-size:.62rem;height:30px;}
  .container{padding:10px;}
  .word-illustration{max-width:120px;max-height:90px;}
  .guided-cell{width:28px;height:32px;font-size:1rem;}
}


/* mode paysage smartphone */
@media (orientation: landscape) and (max-height: 500px) {
  body{align-items:flex-start;padding:4px 0;}
  .container{flex-direction:row;flex-wrap:wrap;max-width:100%;width:99%;border-radius:12px;padding:8px;gap:8px;}
  #menu-initial{flex:1;min-width:200px;}
  #game-zone{flex:1;min-width:200px;}
  #end-screen{flex:1;min-width:200px;}
  .word-illustration{max-width:100px;max-height:80px;}
  .hint-illustration{max-width:90px;max-height:70px;}
  .magnetic-keyboard{padding:5px 4px;}
  .mag-letter{width:26px;height:26px;font-size:.72rem;}
  .mag-delete{height:26px;font-size:.7rem;}
  .mag-space{height:26px;width:56px;}
  .btn{min-height:32px;font-size:.78rem;margin-top:4px;}
  .btn-menu{min-height:32px;}
  .card{padding:6px;margin-bottom:4px;}
  .progress-bar-wrap{height:6px;margin-bottom:6px;}
  .footer{margin-top:4px;font-size:.72rem;}
}
</style>
</head>

function buildCorrectionHtml(typed, target, mode){
  if(mode==='ecrit_mots') return buildCorrectionMots(typed, target);
  // mode standard : comparaison positionnelle stricte, espaces inclus
  const s1=typed.toLowerCase();
  const s2=target.toLowerCase();
  const len=Math.max(s1.length,s2.length);
  let html='';
  // helper : rend un caractère visible (espace → petit tiret)
  function renderCh(ch,cls){
    if(ch===' ') return `<span class="${cls}" style="display:inline-block;width:14px;border-bottom:2px solid currentColor;margin:0 1px;vertical-align:middle;"></span>`;
    return `<span class="${cls}">${ch}</span>`;
  }
  for(let i=0;i<len;i++){
    if(i<s2.length){
      if(i<s1.length){
        if(s1[i]===s2[i]) html+=renderCh(s2[i],'char-correct');
        else html+=renderCh(s1[i],'char-wrong');
      } else {
        html+=renderCh(s2[i],'char-missing');
      }
    } else {
      html+=renderCh(s1[i],'char-wrong');
    }
  }
  return html;
}

// pour écris_mots : aligne mot par mot, détecte les lettres en trop
function buildCorrectionMots(typed, target){
  const wordsT=typed.toLowerCase().split(' ');
  const wordsS=target.toLowerCase().split(' ');
  const len=Math.max(wordsT.length,wordsS.length);
  let parts=[];
  for(let w=0;w<len;w++){
    if(w>0) parts.push('<span style="display:inline-block;width:10px;"></span>');
    const tw=wordsT[w]||'';
    const sw=wordsS[w]||'';
    // LCS pour aligner les lettres du mot
    parts.push(alignWord(tw,sw));
  }
  return parts.join('');
}

// aligne deux mots lettre par lettre via LCS (longest common subsequence)
function alignWord(typed, target){
  const m=typed.length, n=target.length;
  // construire la table LCS
  const dp=Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++){
    if(typed[i-1]===target[j-1]) dp[i][j]=dp[i-1][j-1]+1;
    else dp[i][j]=Math.max(dp[i-1][j],dp[i][j-1]);
  }
  // remonter le chemin
  let i=m,j=n,res=[];
  while(i>0||j>0){
    if(i>0&&j>0&&typed[i-1]===target[j-1]){
      res.unshift({type:'ok',ch:target[j-1]});i--;j--;
    } else if(j>0&&(i===0||dp[i][j-1]>=dp[i-1][j])){
      res.unshift({type:'missing',ch:target[j-1]});j--;
    } else {
      res.unshift({type:'wrong',ch:typed[i-1]});i--;
    }
  }
  return res.map(r=>{
    if(r.type==='ok') return `<span class="char-correct">${r.ch}</span>`;
    if(r.type==='wrong') return `<span class="char-wrong">${r.ch}</span>`;
    return `<span class="char-missing">${r.ch}</span>`;
  }).join('');
}

  if(!el) return;
  el.classList.add('tip');
  // injecter le tooltip à l'intérieur
  if(!el.querySelector('.tiptext')){
    const tip = document.createElement('span');
    tip.className = 'tiptext';
    tip.innerHTML = frLabel + (arSrc && arSrc !== 'xxxmp3' ? ' 🔊' : '');
    if(arSrc && arSrc !== 'xxxmp3'){
      tip.style.cursor = 'pointer';
      tip.onclick = (e)=>{e.stopPropagation(); new Audio(arSrc).play().catch(()=>{});};
    }
    el.appendChild(tip);
  }
}

  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" width="18" height="18"><circle cx="14" cy="14" r="13" fill="#27ae60"/><text x="14" y="18.5" text-anchor="middle" font-size="13" fill="white" font-family="serif" font-weight="bold">+</text><path d="M20,9 Q23,14 20,19" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round"/><path d="M22,6.5 Q27,14 22,21.5" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/></svg>';
}
function playAR(mp3){if(mp3&&mp3!=='xxxmp3')new Audio(mp3).play().catch(()=>{});}

function applyArTooltips(){
  // Met à jour le son du bouton 🔈 réécoute selon le contexte (réécoute ou écoute le mot)
  const task=deck.length?deck[0]:null;
  const bar=document.getElementById('btn-ar-reecoute');
  if(bar&&task){
    if(task.type==='guide'||task.type==='lit') bar.onclick=()=>playAR(UI_AR.ecoute_mot);
    else bar.onclick=()=>playAR(UI_AR.reecoute);
  }
}
function goMenu(){
  document.getElementById('game-zone').style.display='none';
  document.getElementById('end-screen').style.display='none';
  document.getElementById('menu-initial').style.display='block';
}

function startGame(mode){
  currentMode=mode;
  document.getElementById('menu-initial').style.display='none';
  document.getElementById('game-zone').style.display='block';
  deck=[];
  wordsData.forEach(w=>{
    if(mode==='lis') deck.push({type:'lit',q:w.frA,target:w.target});
    else if(mode==='répète') deck.push({type:'oral',q:w.frA,r:w.frA,target:w.target});
    else if(mode==='écris les lettres que tu entends') deck.push({type:'ecrit_lettres',q:w.ep,target:w.target});
    else if(mode==='écris le ou les mots que tu entends') deck.push({type:'ecrit_mots',q:w.frA,target:w.target});
    else if(mode==='copie') deck.push({type:'guide',q:w.frA,target:w.target});
  });
  // double mélange pour un ordre vraiment aléatoire
  for(let pass=0;pass<2;pass++){for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}}
  // éviter deux fois le même mot consécutivement (confort apprenant)
  for(let i=0;i<deck.length-1;i++){if(deck[i].target===deck[i+1].target){for(let j=i+2;j<deck.length;j++){if(deck[j].target!==deck[i].target){[deck[i+1],deck[j]]=[deck[j],deck[i+1]];break;}}}}
  totalInSession=deck.length;successCount=0;errorPile=[];errorPass=0;
  buildKeyboard('keyboard-rows',addChar);
  buildKeyboard('guided-keyboard-rows',guidedPress);
  initCard();
}

function resetEval(){
  document.getElementById('eval-zone').style.display='none';
  document.getElementById('auto-eval').style.display='none';
  document.getElementById('manual-eval').style.display='none';
  document.getElementById('btn-manual-continue').style.display='none';const _bamc2=document.getElementById('btn-ar-manual-continue');if(_bamc2)_bamc2.style.display='none';
  document.getElementById('manual-choices').querySelectorAll('button').forEach(b=>b.disabled=false);
  document.getElementById('diff-display').innerHTML='';
  document.getElementById('replay-zone').innerHTML='';
}

let _manualResult=true;
function recordManual(isOk){
  _manualResult=isOk;
  document.getElementById('manual-choices').querySelectorAll('button').forEach(b=>b.disabled=true);
  document.getElementById('btn-manual-continue').style.display='flex';const _bamc=document.getElementById('btn-ar-manual-continue');if(_bamc)_bamc.style.display='flex';
}
function doManualContinue(){processResult(_manualResult);}

function initCard(){
  if(deck.length===0){showEnd();return;}
  document.getElementById('content-zone').style.display='none';
  document.getElementById('btn-load-question').style.display='flex';
  const task=deck[0];
  const rz=document.getElementById('rubrique-display');
  rz.innerText='✔ '+(LABELS[currentMode]||currentMode)+' — '+successCount+'/'+totalInSession;
  const lb=LABELS_AR[currentMode];
  window._currentRubriqueMp3=lb||null;
  const brub=document.getElementById('btn-ar-rubrique');
  if(brub){brub.style.display=lb?'inline-flex':'none';}
  document.getElementById('total-val').innerText=totalInSession;
  document.getElementById('count-done').innerText=successCount;
  // barre de progression
  const pct=totalInSession>0?Math.round((successCount/(totalInSession))*100):0;
  document.getElementById('progress-fill').style.width=pct+'%';
  audioQ.src=task.q;audioQ.currentTime=0;
  if(task.r)audioR.src=task.r;
  document.getElementById('btn-load-question').innerText='🔊 écoute';
  if(task.type==='lit'||task.type==='guide'){document.getElementById('btn-load-question').style.display='none';const _bae=document.getElementById('btn-ar-ecoute');if(_bae)_bae.style.display='none';loadCurrentTask();}
  else{applyArTooltips();}
}

function loadCurrentTask(){
  const task=deck[0];currentAnswer=[];
  document.getElementById('btn-load-question').style.display='none';
  document.getElementById('content-zone').style.display='block';
  document.getElementById('illus-zone').style.display='none';
  document.getElementById('input-area').style.display='none';
  document.getElementById('guided-area').style.display='none';
  document.getElementById('oral-area').style.display='none';
  document.getElementById('read-word-display').style.display='none';
  document.getElementById('btn-verify').style.display='none';const _bav2=document.getElementById('btn-ar-verifie');if(_bav2)_bav2.style.display='none';
  document.getElementById('btn-reecoute').style.display='none';const _bar2=document.getElementById('btn-ar-reecoute');if(_bar2)_bar2.style.display='none';
  resetEval();

  if(task.type==='lit'){
    showIllus(task.target);
    document.getElementById('btn-reecoute').style.display='none';const _bar2=document.getElementById('btn-ar-reecoute');if(_bar2)_bar2.style.display='none';
    document.getElementById('btn-verify').innerText='🔍 vérifie';
    document.getElementById('btn-verify').style.display='flex';const _bav=document.getElementById('btn-ar-verifie');if(_bav)_bav.style.display='flex';

  } else if(task.type==='guide'){
    document.getElementById('btn-reecoute').style.display='flex';const _bar=document.getElementById('btn-ar-reecoute');if(_bar)_bar.style.display='flex';
    document.getElementById('btn-reecoute').innerText='🔊 écoute le mot';
    document.getElementById('guided-area').style.display='block';
    showIllus(task.target);
    buildGuidedDisplay(task.target);
    document.querySelectorAll('#guided-keyboard-rows .mag-letter,#guided-del').forEach(b=>b.disabled=false);
    const hzg=document.getElementById('hint-illus-zone-guided');
    if(task.hint&&task.hint!=='https://static.wixstatic.com/media/5bb4a0_3d3fd2842df4404fa43d71bbfadfac96~mv2.png'){hzg.innerHTML=`<img src="${task.hint}" class="hint-illustration" alt="">`;hzg.style.display='block';}
    else{hzg.innerHTML='';hzg.style.display='none';}
    audioQ.currentTime=0;audioQ.play().catch(()=>{});

  } else if(task.type==='ecrit_lettres'||task.type==='ecrit_mots'){
    const _baeE=document.getElementById('btn-ar-ecoute');if(_baeE)_baeE.style.display='none';
    document.getElementById('btn-reecoute').style.display='flex';const _bar=document.getElementById('btn-ar-reecoute');if(_bar)_bar.style.display='flex';
    document.getElementById('btn-reecoute').innerText='🔊 réécoute';
    document.getElementById('input-area').style.display='block';
    document.getElementById('main-keyboard').style.display='block';
    document.getElementById('btn-verify').innerText='🔍 vérifie';
    document.getElementById('btn-verify').style.display='flex';const _bav=document.getElementById('btn-ar-verifie');if(_bav)_bav.style.display='flex';
    setKBdis(false);
    renderAD(false);
    showHint(task.target);
    audioQ.currentTime=0;audioQ.play().catch(()=>{});
  } else { // oral
    document.getElementById('btn-reecoute').style.display='flex';const _bar=document.getElementById('btn-ar-reecoute');if(_bar)_bar.style.display='flex';
    document.getElementById('btn-reecoute').innerText='🔊 réécoute';
    const oa=document.getElementById('oral-area');oa.style.display='block';
    showIllus(task.target);
    if(currentMode==='répète'){
      oa.innerHTML='<div style="display:flex;gap:8px;align-items:center;"><div style="font-weight:bold;font-size:1.3rem;background:var(--action);color:white;padding:12px;border-radius:13px;flex:1;">🎙️ parle</div><button class="btn-ar-sound" onclick="playAR(UI_AR.parle)">'+arSoundIcon()+'</button></div>';
      document.getElementById('eval-zone').style.display='flex';
      document.getElementById('auto-eval').style.display='flex';
      const b=document.getElementById('btn-auto-continue');
      b.innerText='continuer ➡️';b.onclick=()=>processResult(true);
    }
    audioQ.currentTime=0;audioQ.play().catch(()=>{});
  }
  applyArTooltips();
}

function playAudio(t){
  if(t==='Q'){if(currentMode==='écris les lettres que tu entends')audioQ.play().catch(()=>{});else{audioQ.currentTime=0;audioQ.play().catch(()=>{});}}
  else audioR.play().catch(()=>{});
}

function handleVerify(){
  const task=deck[0];
  document.getElementById('btn-verify').style.display='none';const _bav2=document.getElementById('btn-ar-verifie');if(_bav2)_bav2.style.display='none';
  document.getElementById('eval-zone').style.display='flex';

  if(task.type==='lit'){
    document.getElementById('btn-reecoute').style.display='flex';const _bar=document.getElementById('btn-ar-reecoute');if(_bar)_bar.style.display='flex';
    document.getElementById('btn-reecoute').innerText='🔊 écoute le mot';
    document.getElementById('btn-reecoute').onclick=function(){audioQ.currentTime=0;audioQ.play().catch(()=>{});};
    document.getElementById('manual-eval').style.display='flex';

  } else if(task.type==='ecrit_lettres'||task.type==='ecrit_mots'){
    // correction lettre par lettre + continuer (l'app décide)
    const val=getAV();
    const isOk=isCorrectStrict(val,task.target);
    document.getElementById('diff-display').innerHTML=buildCorrectionMots(val,task.target);
    document.getElementById('main-keyboard').style.display='none';
    setKBdis(true);
    document.getElementById('auto-eval').style.display='flex';
    const b=document.getElementById('btn-auto-continue');
    b.innerText='continuer ➡️';b.onclick=()=>processResult(isOk);
  }
}

// mini clavier unifié — liveRed=rouge à la saisie
function buildMiniKB(wid,target,audioSrc,liveRed){
  const wrap=document.getElementById(wid);if(!wrap)return;
  let ma=[];
  const did=wid+'-d',rid=wid+'-r';
  wrap.innerHTML=`
    <div id="${did}" style="min-height:44px;border:2px dashed #dee2e6;border-radius:9px;display:flex;align-items:center;justify-content:center;white-space:nowrap;overflow-x:auto;background:#f9f9f9;padding:5px;gap:2px;margin-bottom:5px;font-size:1.1rem;font-family:'Courier New',monospace;"></div>
    <div style="background:#ecf0f1;border-radius:11px;padding:7px 5px;">
      <div id="${wid}-rows"></div>
      <div style="display:flex;justify-content:center;gap:5px;margin-top:3px;">
        <button style="width:60px;height:26px;background:white;border:1px solid #bdc3c7;border-radius:6px;cursor:pointer;font-size:.65rem;color:#7f8c8d;" id="${wid}-sp">espace</button>
        <button style="padding:0 7px;background:#7f8c8d;color:white;font-size:.7rem;height:26px;border-radius:6px;border:none;cursor:pointer;font-weight:bold;" id="${wid}-del">⌫</button>
      </div>
    </div>
    <button style="width:100%;margin-top:5px;padding:6px;background:var(--action);color:white;border:none;border-radius:9px;font-size:.85rem;font-weight:bold;cursor:pointer;" id="${wid}-chk">🔍 vérifie</button>
    <div id="${rid}" class="diff-container" style="margin-top:6px;font-size:1.1rem;flex-wrap:nowrap;overflow-x:auto;"></div>`;
  _fillMiniRows(wid,target,ma,did,liveRed);
  document.getElementById(wid+'-chk').onclick=()=>{
    const v=ma.join('').trim(),r=document.getElementById(rid);
    // toujours LCS pour la correction finale
    r.innerHTML=buildCorrectionMots(v,target);
    if(isCorrectStrict(v,target)){const s=document.createElement('span');s.textContent=' ✅';r.appendChild(s);document.getElementById(wid+'-chk').textContent='⭐ bravo !';}
  };
}



function processResult(isOk){
  const task=deck.shift();
  if(isOk){
    successCount++;
    soundOk();
  } else {
    soundKo();
    errorPile.push(task);
  }
  if(deck.length===0){
    if(errorPile.length>0&&errorPass<2){
      errorPass++;
      deck=errorPile.splice(0);
      for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
    } else {
      showEnd();return;
    }
  }
  initCard();
}

function showEnd(){
  document.getElementById('game-zone').style.display='none';
  const es=document.getElementById('end-screen');es.style.display='block';
  const pct=totalInSession>0?Math.round((successCount/totalInSession)*100):0;
  document.getElementById('end-title').innerText=
    pct===100?'🌟 Parfait !':pct>=80?'👏 Bravo !':pct>=50?'💪 Continue !':'📚 À retravailler';
  document.getElementById('reward-zone').innerHTML=
    `<div class="score-final">Score : ${successCount} / ${totalInSession} (${pct}%)</div>`;
  const opt=document.getElementById('error-options');opt.innerHTML='';
  if(errorPile.length>0){
    const title=document.createElement('p');
    title.style.cssText='font-size:.9rem;color:var(--error);font-weight:bold;margin:10px 0 6px;';
    title.textContent='Mots à revoir :';opt.appendChild(title);
    const ed=document.createElement('div');ed.style.cssText='display:flex;flex-direction:column;gap:8px;';
    errorPile.forEach((task)=>{
      const d=document.createElement('div');
      d.style.cssText='background:#fff5f5;border:1px solid #f5c6cb;border-radius:12px;padding:10px;text-align:left;';
      d.innerHTML=`<div style="font-size:1.1rem;font-weight:bold;color:#2c3e50;margin-bottom:6px;">${task.target}</div>
        <button class="btn btn-play" style="margin-bottom:6px;" onclick="(function(){new Audio('${task.q}').play();}())">🔊 réécoute</button>`;
      ed.appendChild(d);
    });
    opt.appendChild(ed);
  }
}

function _fillMiniRows(wid,target,ma,did,liveRed){
  const re=document.getElementById(wid+'-rows');re.innerHTML='';
  KEYBOARD_ROWS.forEach(row=>{
    const d=document.createElement('div');d.style.cssText='display:flex;justify-content:center;gap:3px;flex-wrap:wrap;margin-bottom:3px;';
    row.forEach(l=>{
      const b=document.createElement('button');
      b.style.cssText=`display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:6px;font-size:.78rem;font-weight:bold;cursor:pointer;border:none;box-shadow:0 2px 0 rgba(0,0,0,.2);flex-shrink:0;background:${isVowel(l)?'#8e44ad':'#d35400'};color:white;`;
      b.textContent=l;b.onclick=()=>{ma.push(l);rm();};d.appendChild(b);
    });
    re.appendChild(d);
  });
  document.getElementById(wid+'-sp').onclick=()=>{ma.push(' ');rm();};
  document.getElementById(wid+'-del').onclick=()=>{ma.pop();rm();};
  function rm(){
    const d=document.getElementById(did);d.innerHTML='';
    ma.forEach((ch,i)=>{
      if(ch===' '){const sp=document.createElement('span');sp.style.cssText='display:inline-block;width:10px;cursor:pointer;';sp.onclick=()=>{ma.splice(i,1);rm();};d.appendChild(sp);}
      else{
        const span=document.createElement('span');
        const ko=liveRed&&i<target.length&&ch.toLowerCase()!==target[i].toLowerCase();
        const ko2=liveRed&&i>=target.length;
        span.style.cssText=`display:inline-flex;align-items:center;justify-content:center;width:28px;height:32px;border-radius:5px;font-size:1rem;border:2px solid ${(ko||ko2)?'var(--error)':'#dee2e6'};background:${(ko||ko2)?'#fdedec':'white'};color:${(ko||ko2)?'var(--error)':'#2c3e50'};${(ko||ko2)?'text-decoration:line-through;':''}cursor:pointer;`;
        span.textContent=ch;span.onclick=()=>{ma.splice(i,1);rm();};d.appendChild(span);
      }
    });
  }
}
